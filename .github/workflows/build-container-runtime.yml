name: Build CFW Container Runtime

on:
  push:
    branches:
      - main
      - agent/integrated-container-runtime
    tags:
      - cfw-runtime-v*
    paths:
      - 'compat/**'
      - 'choc_install.ps1'
      - 'winetricks.ps1'
      - '.github/workflows/build-container-runtime.yml'
  pull_request:
    paths:
      - 'compat/**'
      - 'choc_install.ps1'
      - 'winetricks.ps1'
      - '.github/workflows/build-container-runtime.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  runtime:
    name: wine-${{ matrix.wine }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        wine: ['9.0', '10.0', '11.0']
    env:
      IMAGE: ghcr.io/pelagians/cage-wine:${{ matrix.wine }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull and resolve Cage Wine runtime
        id: image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          image_ref="$(docker image inspect "$IMAGE" --format '{{index .RepoDigests 0}}')"
          test -n "$image_ref"
          printf 'image=%s\n' "$image_ref" >> "$GITHUB_OUTPUT"

      - name: Build CFW runtime prefix
        id: build
        shell: bash
        run: |
          set +e
          out="$PWD/dist/wine-${{ matrix.wine }}"
          mkdir -p "$out"
          docker run --rm \
            -e WINEPREFIX=/out/prefix \
            -e CFW_BUILD_CACHE=/out/cache \
            -e CFW_WINE_IMAGE='${{ steps.image.outputs.image }}' \
            -e CFW_SOURCE_REVISION='${{ github.sha }}' \
            -e CFW_RUNTIME_ARTIFACT_NAME='cfw-runtime-prefix-wine-${{ matrix.wine }}' \
            -e CFW_RUNTIME_EVIDENCE_NAME='cfw-runtime-evidence-wine-${{ matrix.wine }}.json' \
            -e CFW_RUNTIME_MANIFEST_NAME='cfw-runtime-manifest-wine-${{ matrix.wine }}.json' \
            -v "$PWD:/src:ro" \
            -v "$out:/out" \
            "$IMAGE" \
            /bin/bash /src/compat/build-runtime.sh /out \
            2>&1 | tee "$out/workflow.log"
          rc=${PIPESTATUS[0]}
          sudo chown -R "$(id -u):$(id -g)" "$out" || true
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: emit failure evidence
        if: failure() && steps.build.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          out="$PWD/dist/wine-${{ matrix.wine }}"
          logs="$out/logs"
          capture="$out/cfw-public-failure-evidence.txt"
          {
            echo "wine=${{ matrix.wine }} build_exit_code=${{ steps.build.outputs.exit_code }}"
            evidence="$out/cfw-runtime-evidence-wine-${{ matrix.wine }}.json"
            if [ -f "$evidence" ]; then
              echo '--- runtime evidence ---'
              python3 -c 'import json,sys; from pathlib import Path; p=json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")); print(json.dumps({"status":p.get("status"),"checks":p.get("checks",{}),"returnCodes":p.get("returnCodes",{}),"markers":sorted(p.get("markerSha256",{}))},sort_keys=True))' "$evidence"
            fi
            for name in build-stages pwsh-proof-summary pwsh-probe pwsh-failure-trace choco-feature-policy choco-feature-status choco-version synchro-x64 synchro-x86 choco-smoke-install choco-smoke-uninstall winepath-cfw-cache winepath-cfw-installer winepath-pwsh-executable winepath-pwsh-probe-script winepath-pwsh-marker wineboot; do
              path="$logs/${name}.log"
              if [ -f "$path" ]; then
                echo "--- ${name}.log (tail) ---"
                tail -40 "$path"
              fi
            done
            echo '--- installer stages ---'
            grep -a '^\[cfw\] stage=' "$logs/installer.log" 2>/dev/null || true
            echo "--- workflow.log (tail) ---"
            tail -60 "$out/workflow.log" 2>/dev/null || true
          } > "$capture"
          evidence_b64="$(head -c 2600 "$capture" | base64 -w0)"
          echo "::error title=CFW runtime build failed::wine=${{ matrix.wine }} rc=${{ steps.build.outputs.exit_code }} evidence_b64=${evidence_b64}"
          cat "$capture"

      - name: Summarize runtime evidence
        if: always()
        shell: bash
        run: |
          out="$PWD/dist/wine-${{ matrix.wine }}"
          echo '### CFW runtime build — Wine ${{ matrix.wine }}' >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$out/cfw-runtime-evidence-wine-${{ matrix.wine }}.json" ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$out/cfw-runtime-evidence-wine-${{ matrix.wine }}.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No passing runtime metadata was produced.' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$out/cfw-runtime-manifest-wine-${{ matrix.wine }}.json" ]; then
            echo '#### Release manifest' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$out/cfw-runtime-manifest-wine-${{ matrix.wine }}.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          for log in pwsh-probe installer choco-smoke-install choco-smoke-uninstall; do
            if [ -f "$out/logs/${log}.log" ]; then
              echo "#### ${log}" >> "$GITHUB_STEP_SUMMARY"
              echo '```text' >> "$GITHUB_STEP_SUMMARY"
              tail -80 "$out/logs/${log}.log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload runtime candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfw-runtime-wine-${{ matrix.wine }}-${{ github.sha }}
          retention-days: 7
          if-no-files-found: warn
          compression-level: 0
          path: |
            dist/wine-${{ matrix.wine }}/workflow.log
            dist/wine-${{ matrix.wine }}/cfw-public-failure-evidence.txt
            dist/wine-${{ matrix.wine }}/cfw-runtime-evidence-wine-${{ matrix.wine }}.json
            dist/wine-${{ matrix.wine }}/cfw-runtime-manifest-wine-${{ matrix.wine }}.json
            dist/wine-${{ matrix.wine }}/cfw-runtime-prefix-wine-${{ matrix.wine }}.tar.gz
            dist/wine-${{ matrix.wine }}/cfw-runtime-prefix-wine-${{ matrix.wine }}.tar.gz.sha256
            dist/wine-${{ matrix.wine }}/logs

  publish:
    name: publish prepared runtimes
    if: startsWith(github.ref, 'refs/tags/cfw-runtime-v')
    needs: runtime
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download proven runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cfw-runtime-wine-*
          path: release-assets
          merge-multiple: false

      - name: Validate release evidence
        env:
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          expected_wines=(9.0 10.0 11.0)
          for wine in "${expected_wines[@]}"; do
            mapfile -t manifests < <(find release-assets -name "cfw-runtime-manifest-wine-${wine}.json" -type f | sort)
            test "${#manifests[@]}" -eq 1
            python3 - "${manifests[0]}" "$GITHUB_SHA" "$wine" <<'PY'
          import hashlib
          import json
          import re
          import sys
          from pathlib import Path

          manifest_path = Path(sys.argv[1])
          source_revision = sys.argv[2]
          wine = sys.argv[3]
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          directory = manifest_path.parent

          def sha256(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()

          assert manifest_path.name == f"cfw-runtime-manifest-wine-{wine}.json"
          assert manifest["schemaVersion"] == "cfw.prepared-runtime-manifest/v1"
          assert manifest["status"] == "passed"
          assert manifest["sourceRevision"] == source_revision
          assert re.fullmatch(r"[0-9a-f]{40}", source_revision)
          assert re.fullmatch(
              r"ghcr\.io/pelagians/cage-wine@sha256:[0-9a-f]{64}",
              manifest["wine"]["image"],
          )
          archive = directory / manifest["archive"]["filename"]
          evidence = directory / manifest["runtimeEvidence"]["filename"]
          checksum = directory / f"{archive.name}.sha256"
          assert archive.name == f"cfw-runtime-prefix-wine-{wine}.tar.gz"
          assert evidence.name == f"cfw-runtime-evidence-wine-{wine}.json"
          assert archive.is_file() and evidence.is_file() and checksum.is_file()
          assert archive.stat().st_size == manifest["archive"]["bytes"]
          assert sha256(archive) == manifest["archive"]["sha256"]
          assert sha256(evidence) == manifest["runtimeEvidence"]["sha256"]
          assert checksum.read_text(encoding="utf-8") == f"{sha256(archive)}  {archive.name}\n"
          runtime = json.loads(evidence.read_text(encoding="utf-8"))
          assert runtime["status"] == "passed"
          assert runtime["sourceRevision"] == source_revision
          assert runtime["wine"] == manifest["wine"]
          assert all(runtime["checks"].values())
          PY
          done

      - name: Publish tagged prepared runtime assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          mapfile -t assets < <(find release-assets -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' -o -name 'cfw-runtime-evidence-wine-*.json' -o -name 'cfw-runtime-manifest-wine-*.json' \) | sort)
          test "${#assets[@]}" -eq 12
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "[cfw] release already exists and is immutable: $tag" >&2
            exit 1
          fi
          gh release create "$tag" "${assets[@]}" \
            --title "$tag" \
            --notes 'Prepared CFW compatibility runtime assets. Each manifest binds its prefix archive to exact inputs, source revision, Wine image digest, and runtime evidence.'
